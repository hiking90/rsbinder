name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC

env:
  CARGO_TERM_COLOR: always
  rust_min: '1.85'

jobs:
  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run audit
        uses: actions-rust-lang/audit@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  linux-build:
    name: Linux Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust ${{ env.rust_min }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_min }}
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace --all-features
        env:
          RUSTFLAGS: "" # remove -Dwarnings
      - name: Build release
        run: cargo build --workspace --release
      - name: Check test builds
        run: |
          cargo test --workspace --no-run

  rpc-suite:
    name: RPC Transport Suite
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      # The RPC stack is hermetic — mem/unix backends only, no
      # /dev/binder, no binderfs, no servicemanager (master §6). It
      # runs on a plain runner, unlike the kernel-binder matrix in
      # integration-test.yml. This job is the missing CI enforcement
      # of the plan's V1/V4/V5 gates for the RPC stack (T3).
      - name: AC-1.1 build matrix (rpc OFF / rpc / tcp-debug / tls)
        run: |
          cargo build -p rsbinder
          cargo build -p rsbinder --features rpc
          cargo build -p rsbinder --features rpc-tcp-debug
          cargo build -p rsbinder --features rpc-tls
      - name: RPC unit + e2e (rsbinder, hermetic)
        run: |
          cargo test -p rsbinder --features rpc --lib rpc::
          cargo test -p rsbinder --features rpc --test rpc_e2e --test rpc_server --test rpc_fd
          cargo test -p rsbinder --features rpc-tls --test rpc_tls
      - name: Generated-stub e2e (tests crate)
        run: |
          cargo test -p tests --features rpc --test rpc_generated_stub
          cargo test -p tests --features rpc-tcp-debug --test rpc_generated_stub
      - name: V5 parallel-safety soak (default test-threads, 5x)
        run: |
          for i in 1 2 3 4 5; do
            echo "soak iteration $i"
            cargo test -p rsbinder --features rpc --test rpc_server --test rpc_e2e || exit 1
          done

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target: [x86_64-linux-android, aarch64-linux-android]
    steps:
    - uses: actions/checkout@v6
    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26c
        add-to-path: false
        local-cache: true
    - name: Install Rust stable for cargo-ndk
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }} # Keep targets for stable as well, in case cargo-ndk needs it
    - name: Install cargo-ndk
      run: cargo install cargo-ndk --version "^3.0"
    - name: Install Rust ${{ env.rust_min }} for build
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ env.rust_min }}
        targets: ${{ matrix.target }}
        override: true # Ensure this toolchain overrides the previous one for subsequent steps
    - uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}-${{ env.rust_min }} # Add rust_min to cache key as it's specific now
    - name: Build for Android (${{ matrix.target }})
      run: cargo ndk -t ${{ matrix.target }} build --release
    - name: Check test builds for Android (${{ matrix.target }})
      run: |
        cargo ndk -t ${{ matrix.target }} test --no-run

